<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة مستخدم جديد - نظام إدارة الموارد البشرية</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-green: #10b981;
            --dark-green: #059669;
            --light-green: #34d399;
            --accent-green: #a7f3d0;
            --gradient-primary: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --gradient-secondary: linear-gradient(135deg, #34d399 0%, #10b981 100%);
            --gradient-dark: linear-gradient(135deg, #065f46 0%, #047857 100%);
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .create-user-container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header-card {
            background: var(--gradient-dark);
            border: none;
            border-radius: 20px;
            color: white;
            box-shadow: 0 15px 35px rgba(5, 150, 105, 0.2);
            transition: all 0.3s ease;
        }
        
        .header-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(5, 150, 105, 0.3);
        }
        
        .form-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(16, 185, 129, 0.1);
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            transition: all 0.3s ease;
        }
        
        .form-card:hover {
            box-shadow: 0 20px 45px rgba(16, 185, 129, 0.15);
        }
        
        .form-control {
            border: 2px solid rgba(16, 185, 129, 0.1);
            border-radius: 15px;
            padding: 12px 15px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }
        
        .form-control:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 0.2rem rgba(16, 185, 129, 0.15);
            background: white;
            transform: translateY(-2px);
        }
        
        .form-select {
            border: 2px solid rgba(16, 185, 129, 0.1);
            border-radius: 15px;
            padding: 12px 15px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }
        
        .form-select:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 0.2rem rgba(16, 185, 129, 0.15);
            background: white;
            transform: translateY(-2px);
        }
        
        .form-check-input {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(16, 185, 129, 0.3);
            margin-left: 10px;
        }
        
        .form-check-input:checked {
            background-color: var(--primary-green);
            border-color: var(--primary-green);
        }
        
        .form-check-input:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 0.2rem rgba(16, 185, 129, 0.25);
        }
        
        .form-label {
            font-weight: 600;
            color: var(--dark-green);
            margin-bottom: 8px;
        }
        
        .btn-primary {
            background: var(--gradient-primary);
            border: none;
            border-radius: 15px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }
        
        .btn-secondary {
            background: rgba(107, 114, 128, 0.1);
            border: 2px solid rgba(107, 114, 128, 0.3);
            color: #6b7280;
            border-radius: 15px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background: rgba(107, 114, 128, 0.2);
            border-color: rgba(107, 114, 128, 0.5);
            transform: translateY(-2px);
            color: #6b7280;
        }
        
        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 15px;
            padding: 10px 20px;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            color: white;
        }
        
        .floating-shape {
            position: fixed;
            width: 200px;
            height: 200px;
            background: var(--gradient-primary);
            opacity: 0.1;
            border-radius: 50%;
            z-index: -1;
            animation: float 6s ease-in-out infinite;
        }
        
        .shape-1 {
            top: 10%;
            left: 10%;
        }
        
        .shape-2 {
            bottom: 10%;
            right: 10%;
            animation-delay: 2s;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
        
        .input-group {
            position: relative;
        }
        
        .input-group-text {
            background: rgba(16, 185, 129, 0.05);
            border: 2px solid rgba(16, 185, 129, 0.1);
            border-right: none;
            color: var(--dark-green);
            border-radius: 15px 0 0 15px;
        }
        
        .password-toggle {
            background: rgba(16, 185, 129, 0.05);
            border: 2px solid rgba(16, 185, 129, 0.1);
            border-left: none;
            color: var(--dark-green);
            border-radius: 0 15px 15px 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .password-toggle:hover {
            background: rgba(16, 185, 129, 0.1);
            color: var(--dark-green);
        }
        
        .form-section {
            background: rgba(16, 185, 129, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(16, 185, 129, 0.1);
        }
        
        .form-section-title {
            color: var(--dark-green);
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .feature-icon {
            width: 50px;
            height: 50px;
            background: var(--gradient-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <!-- Background Shapes -->
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>
    
    <div class="create-user-container">
        <!-- Header -->
        <div class="header-card card mb-4">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <h1 class="h2 fw-bold mb-2">
                            <i class="bi bi-person-plus-fill me-3"></i>
                            إضافة مستخدم جديد
                        </h1>
                        <p class="mb-0 opacity-75">إضافة مستخدم جديد إلى نظام إدارة الموارد البشرية</p>
                    </div>
                    <div class="col-md-4 text-start">
                        <a href="{{ url_for('admin_users') }}" class="btn back-btn">
                            <i class="bi bi-arrow-right me-2"></i>
                            العودة للقائمة
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Form Card -->
        <div class="form-card card">
            <div class="card-header bg-transparent border-bottom-0 py-4">
                <h5 class="card-title fw-bold mb-0 text-dark">
                    <i class="bi bi-person-badge me-2 text-success"></i>
                    بيانات المستخدم الجديد
                </h5>
            </div>
            
            <div class="card-body">
                <form method="POST" id="createUserForm">
                    <!-- Basic Information Section -->
                    <div class="form-section">
                        <h6 class="form-section-title">
                            <i class="bi bi-info-circle text-success"></i>
                            المعلومات الأساسية
                        </h6>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="username" class="form-label">
                                    <i class="bi bi-person me-2 text-success"></i>
                                    اسم المستخدم
                                </label>
                                <div class="input-group">
                                    <input type="text" class="form-control" id="username" name="username" required 
                                           placeholder="أدخل اسم المستخدم">
                                    <span class="input-group-text">
                                        <i class="bi bi-at"></i>
                                    </span>
                                </div>
                                <div class="form-text text-muted">اسم المستخدم المستخدم لتسجيل الدخول</div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="name" class="form-label">
                                    <i class="bi bi-card-text me-2 text-success"></i>
                                    الاسم الكامل
                                </label>
                                <input type="text" class="form-control" id="name" name="name" required 
                                       placeholder="أدخل الاسم الكامل">
                            </div>
                        </div>
                    </div>

                    <!-- Security & Department Section -->
                    <div class="form-section">
                        <h6 class="form-section-title">
                            <i class="bi bi-shield-lock text-success"></i>
                            الأمان والتخصيص
                        </h6>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="password" class="form-label">
                                    <i class="bi bi-key me-2 text-success"></i>
                                    كلمة المرور
                                </label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="password" name="password" required 
                                           placeholder="أدخل كلمة المرور">
                                    <button type="button" class="btn password-toggle" id="togglePassword">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                                <div class="form-text text-muted">كلمة مرور قوية تحتوي على أحرف وأرقام</div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="department_id" class="form-label">
                                    <i class="bi bi-building me-2 text-success"></i>
                                    القسم
                                </label>
                                <select class="form-select" id="department_id" name="department_id">
                                    <option value="">اختر القسم...</option>
                                    {% for department in departments %}
                                    <option value="{{ department.id }}">{{ department.name }}</option>
                                    {% endfor %}
                                </select>
                                <div class="form-text text-muted">اختر القسم التابع له المستخدم</div>
                            </div>
                        </div>
                    </div>

                    <!-- Permissions Section -->
                    <div class="form-section">
                        <h6 class="form-section-title">
                            <i class="bi bi-gear text-success"></i>
                            الصلاحيات
                        </h6>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-check form-switch mb-3">
                                    <input class="form-check-input" type="checkbox" id="is_manager" name="is_manager">
                                    <label class="form-check-label fw-semibold" for="is_manager">
                                        <i class="bi bi-star me-2 text-warning"></i>
                                        مدير قسم
                                    </label>
                                    <div class="form-text text-muted">يمنح المستخدم صلاحيات إدارة القسم</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Form Actions -->
                    <div class="mt-4 pt-3 border-top">
                        <div class="d-flex gap-3 justify-content-start">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-person-plus me-2"></i>
                                إنشاء المستخدم
                            </button>
                            <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">
                                <i class="bi bi-x-circle me-2"></i>
                                إلغاء
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Enhanced password toggle
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
                this.classList.add('btn-success');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
                this.classList.remove('btn-success');
            }
        });

        // Form validation and enhancements
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('createUserForm');
            const inputs = form.querySelectorAll('.form-control, .form-select');
            
            // Add focus effects
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.classList.add('border-success');
                });
                
                input.addEventListener('blur', function() {
                    this.parentElement.classList.remove('border-success');
                });
                
                input.addEventListener('input', function() {
                    if (this.value.length > 0) {
                        this.classList.add('is-valid');
                    } else {
                        this.classList.remove('is-valid');
                    }
                });
            });

            // Password strength indicator
            const passwordInput = document.getElementById('password');
            passwordInput.addEventListener('input', function() {
                const strength = calculatePasswordStrength(this.value);
                const strengthText = document.getElementById('passwordStrength') || createPasswordStrengthIndicator();
                updatePasswordStrength(strength, strengthText);
            });

            function calculatePasswordStrength(password) {
                let strength = 0;
                if (password.length >= 8) strength++;
                if (password.match(/[a-z]/)) strength++;
                if (password.match(/[A-Z]/)) strength++;
                if (password.match(/[0-9]/)) strength++;
                if (password.match(/[^a-zA-Z0-9]/)) strength++;
                return strength;
            }

            function createPasswordStrengthIndicator() {
                const indicator = document.createElement('div');
                indicator.id = 'passwordStrength';
                indicator.className = 'mt-2';
                passwordInput.parentNode.appendChild(indicator);
                return indicator;
            }

            function updatePasswordStrength(strength, element) {
                const levels = [
                    { text: 'ضعيفة جداً', color: 'danger' },
                    { text: 'ضعيفة', color: 'warning' },
                    { text: 'متوسطة', color: 'info' },
                    { text: 'قوية', color: 'success' },
                    { text: 'قوية جداً', color: 'success' }
                ];
                
                const level = levels[Math.min(strength, 4)];
                element.innerHTML = `
                    <div class="progress" style="height: 6px;">
                        <div class="progress-bar bg-${level.color}" style="width: ${(strength / 5) * 100}%"></div>
                    </div>
                    <small class="text-${level.color}">قوة كلمة المرور: ${level.text}</small>
                `;
            }

            // Form submission with loading state
            form.addEventListener('submit', function(e) {
                const submitBtn = this.querySelector('button[type="submit"]');
                const originalText = submitBtn.innerHTML;
                
                // Show loading state
                submitBtn.innerHTML = `
                    <div class="spinner-border spinner-border-sm me-2" role="status">
                        <span class="visually-hidden">جاري التحميل...</span>
                    </div>
                    جاري إنشاء المستخدم...
                `;
                submitBtn.disabled = true;
                
                // You can add additional validation here if needed
            });

            // Add ripple effect to buttons
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    // Create ripple effect
                    const ripple = document.createElement('span');
                    const rect = this.getBoundingClientRect();
                    const size = Math.max(rect.width, rect.height);
                    const x = e.clientX - rect.left - size / 2;
                    const y = e.clientY - rect.top - size / 2;
                    
                    ripple.style.cssText = `
                        position: absolute;
                        border-radius: 50%;
                        background: rgba(255, 255, 255, 0.6);
                        transform: scale(0);
                        animation: ripple 0.6s linear;
                        width: ${size}px;
                        height: ${size}px;
                        left: ${x}px;
                        top: ${y}px;
                        pointer-events: none;
                    `;
                    
                    this.style.position = 'relative';
                    this.style.overflow = 'hidden';
                    this.appendChild(ripple);
                    
                    setTimeout(() => ripple.remove(), 600);
                });
            });
        });

        // Add ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: scale(4);
                    opacity: 0;
                }
            }
            
            .form-control.is-valid {
                border-color: var(--primary-green);
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
